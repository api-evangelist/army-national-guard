  - type: Features
    data:
      - name: Recruiting Portal
        description: >-
          GoArmyGuard.com and the main recruiting portal allow prospective
          soldiers to search job listings by MOS, state, and skill, and connect
          with local recruiters.
      - name: FOIA Request System
        description: >-
          Online submission and tracking system for Freedom of Information Act
          requests to the National Guard Bureau and Army National Guard.
      - name: Soldier Self-Service Portal
        description: >-
          Current soldiers access pay, benefits, training records, and
          deployment orders through the Army self-service portal integrated
          with the National Guard.
      - name: Unit Locator
        description: >-
          Public-facing tool allowing citizens to find Army National Guard units
          and armory locations in their state or territory.
  - type: UseCases
    data:
      - name: Recruit Prospective Soldiers
        description: >-
          Recruiters and prospective enlistees use the recruiting portal to
          search available MOS positions, explore benefits, and initiate the
          enlistment process.
      - name: Submit FOIA Requests
        description: >-
          Journalists, researchers, and citizens submit Freedom of Information
          Act requests for Army National Guard records and documents.
      - name: Locate National Guard Units
        description: >-
          Citizens and emergency managers find local National Guard units and
          armory locations for community engagement or emergency coordination.
      - name: Access Soldier Benefits Information
        description: >-
          Soldiers and their families access information on benefits including
          education assistance (Montgomery GI Bill), healthcare (TRICARE), and
          retirement benefits.
  - type: Integrations
    data:
      - name: USA Jobs
        description: >-
          Army National Guard job listings integrate with USAJobs.gov, the
          federal government's official employment site, for civil service and
          technician positions.
      - name: MyArmyBenefits
        description: >-
          Integration with the Army's official benefits counseling portal
          (myarmybenefits.us.army.mil) for National Guard member benefits
          information.
      - name: Army Training Requirements and Resources System (ATRRS)
        description: >-
          Training management system used by the National Guard to manage
          soldier training requirements and school seat reservations.
      - name: Defense Finance and Accounting Service (DFAS)
        description: >-
          Financial management integration for National Guard pay, travel
          reimbursement, and benefits payments processed through DFAS.
