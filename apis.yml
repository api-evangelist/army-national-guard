description: >-
  The Army National Guard is a reserve component of the United States Army that serves
  both the nation and state in times of need. Its primary mission is to provide trained
  and ready soldiers to support military operations abroad, as well as assist with
  disaster relief and homeland security efforts at home. Members of the Army National
  Guard undergo training and drills on a regular basis to ensure they are prepared
  to deploy at a moment's notice.
