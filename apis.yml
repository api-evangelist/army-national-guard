description: >-
  The Army National Guard is a reserve component of the United States Army that
  serves both the nation and individual states in times of need. Operating under
  the dual authority of the federal government and the fifty state governors, the
  Army National Guard provides trained and ready soldiers for overseas military
  operations, domestic disaster relief, homeland security, and civil support
  missions. Its primary data and digital services are focused on recruiting,
  career management, benefits administration, and public outreach. The National
  Guard Bureau (NGB) coordinates federal operations and maintains administrative
  systems under Title 10 and Title 32 of the United States Code.
apis:
  - aid: army-national-guard:recruiting-api
    name: Army National Guard Recruiting API
    description: >-
      The Army National Guard Recruiting API provides access to job listings,
      Military Occupational Specialties (MOS), unit locations, and recruiter
      contact information for prospective members interested in joining the
      National Guard. This supports the GoArmyGuard.com recruiting portal.
    humanURL: https://www.nationalguard.mil/Portals/31/Documents/About/NGB_Fact_Sheet.pdf
    baseURL: https://www.nationalguard.mil
    tags:
      - Recruiting
      - Military
      - Jobs
      - National Guard
    properties:
      - type: Documentation
        url: https://www.nationalguard.mil/Recruiting/
  - aid: army-national-guard:foia-api
    name: Army National Guard FOIA Portal
    description: >-
      The Freedom of Information Act (FOIA) portal for the Army National Guard
      and National Guard Bureau provides a mechanism for submitting FOIA
      requests, tracking request status, and accessing previously released
      records. Managed under the NGB FOIA Policy.
    humanURL: https://www.nationalguard.mil/About/FOIA/
    baseURL: https://www.nationalguard.mil
    tags:
      - FOIA
      - Government
      - Transparency
      - Open Government
    properties:
      - type: Documentation
        url: https://www.nationalguard.mil/About/FOIA/
